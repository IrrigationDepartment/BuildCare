name: BuildCare
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1
environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core & Authentication
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  
  # Firebase Database, Storage & Functions
  cloud_firestore: ^6.0.3
  firebase_storage: ^13.0.4
  cloud_functions: ^6.0.5
  firebase_messaging: ^16.1.0

  # State Management
  provider: ^6.1.2
  rxdart: ^0.28.0

  # UI & UX Packages
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1
  syncfusion_flutter_charts: ^32.1.23
  
  # Image & File Handling
  image_picker: ^1.2.1
  file_picker: ^10.3.8
  pdf: ^3.10.7
  printing: ^5.11.1
  
  # Utility Packages
  intl: ^0.20.2
  http: ^1.2.1
  http_parser: ^4.0.2
  dio: ^5.4.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  path: ^1.9.0
  crypto: ^3.0.3
  share_plus: ^7.2.0
  foundation: ^0.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - lib/src/