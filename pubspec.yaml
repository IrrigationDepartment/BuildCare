name: buildcare
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core & Authentication
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  
  # Firebase Database, Storage & Functions
  cloud_firestore: ^6.0.3
  firebase_storage: ^13.0.4
  firebase_messaging: ^16.1.0
  cloud_functions: ^6.0.5

  # State Management
  provider: ^6.1.2
  rxdart: ^0.28.0

  # UI & UX Packages
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1
  syncfusion_flutter_charts: ^32.2.5

  # Image & File Handling
  image_picker: ^1.2.1
  file_picker: ^10.3.8

  # Utility Packages
  intl: ^0.20.2
  http: ^1.2.1
  http_parser: ^4.0.2
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  path: ^1.9.0
  crypto: ^3.0.3
  foundation: ^0.0.5
  printing: ^5.11.0
  share_plus: ^7.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - lib/src/my.gif # Explicitly pointing to your logo
    - lib/assets/images/login.png # Explicitly pointing to your login image
    - lib/src/logo.png # Added your new app logo

# --- App Icon Configuration ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/src/logo.png"