name: buildcare
description: "A new Flutter project."
# Prevent accidental publishing to pub.dev
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  #----------------------------------------------------
  # Firebase (Your existing packages)
  #----------------------------------------------------
  firebase_core: ^3.1.1 
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2

  #----------------------------------------------------
  # Common Firebase Add-ons
  #----------------------------------------------------
  # For uploading files (like images, PDFs) to Firebase
  firebase_storage: ^12.1.0 
  # For handling push notifications
  firebase_messaging: ^15.0.2 

  #----------------------------------------------------
  # State Management
  #----------------------------------------------------
  # A simple and common way to manage your app's state
  provider: ^6.1.2 

  #----------------------------------------------------
  # UI & UX Packages
  #----------------------------------------------------
  # For easily using any of the 1,000+ fonts from fonts.google.com
  google_fonts: ^6.2.1 
  # To show images from the internet with caching and placeholders
  cached_network_image: ^3.3.1 
  # For picking images or videos from the phone's gallery or camera
  image_picker: ^1.1.2 
  # A collection of beautiful loading indicators
  flutter_spinkit: ^5.2.1 

  #----------------------------------------------------
  # Utility Packages
  #----------------------------------------------------
  # For making HTTP requests to other APIs
  http: ^1.2.1 
  # For formatting dates, times, numbers, and currencies
  intl: ^0.19.0 
  # For saving simple key-value data (like user settings)
  shared_preferences: ^2.2.3 
  # For opening web URLs, sending emails, or making phone calls
  url_launcher: ^6.3.0 
  # For finding the correct local file paths on the device
  path_provider: ^2.1.3 
  cloud_functions: ^5.6.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  #----------------------------------------------------
  # App Branding (Run these from the terminal)
  #----------------------------------------------------
  # For automatically creating your app launcher icons
  # Run: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.13.1 

  # For setting up your app's native splash screen
  # Run: dart run flutter_native_splash:create
  flutter_native_splash: ^2.4.0 


# The following section is specific to Flutter.
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section.
  # I've changed your 'lib/src/' path to a more standard setup.
  assets:
    - assets/images/
    - assets/icons/
    # Example:
    # - assets/images/logo.png
    # - assets/icons/home_icon.svg

  # To add custom fonts, uncomment this section.
  # (Note: google_fonts package above is much easier)
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic